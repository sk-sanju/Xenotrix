name: Sync Fork to Original Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify PAT
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "PAT_TOKEN secret is missing."
            exit 1
          fi
          echo "PAT_TOKEN is available."

      - name: Add Original Repository
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git remote add upstream https://x-access-token:${PAT_TOKEN}@github.com/Xenotrix-Technologies/Xenotrix.git

      - name: Fetch Original Repository
        run: |
          git fetch upstream

      - name: Push to Original Repository
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git push upstream HEAD:main
